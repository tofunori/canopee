name: Canope
options:
  bundleIdPrefix: com.canope
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  DiffMatchPatch:
    url: https://github.com/PasiSalenius/DiffMatchPatch
    branch: main

targets:
  Canope:
    type: application
    platform: macOS
    sources:
      - Canope
      - path: scripts/canope_claude_ide_bridge.py
        buildPhase: resources
    dependencies:
      - package: SwiftTerm
      - product: diff-match-patch
        package: DiffMatchPatch
    scheme:
      testTargets:
        - CanopeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.canope.app
        PRODUCT_NAME: Canope
        PRODUCT_MODULE_NAME: Canope
        MARKETING_VERSION: "0.2.3"
        CURRENT_PROJECT_VERSION: 5
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: Canope
        INFOPLIST_KEY_ApplePressAndHoldEnabled: NO
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Canope/Resources/Canope.entitlements

  CanopeTests:
    type: bundle.unit-test
    platform: macOS
    sources: [CanopeTests]
    dependencies:
      - target: Canope
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.canope.app.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Canope.app/Contents/MacOS/Canope"
        BUNDLE_LOADER: "$(TEST_HOST)"
